apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: po-generator
  labels:
    app.kubernetes.io/name: po-generator
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 10

      containers:
        - name: frontend
          # Updated by Jenkins: ghcr.io/<YOUR_GITHUB_USERNAME>/po-generator-frontend:<tag>
          image: ghcr.io/Jiviashwin/po-generator-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

      # imagePullSecrets:
      #   - name: ghcr-credentials
