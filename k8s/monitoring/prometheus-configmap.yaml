apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: po-generator
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Scrape the PO Generator backend
      - job_name: 'po-generator-backend'
        static_configs:
          - targets: ['backend-service:5002']
        metrics_path: '/api/metrics'

      # Node exporter for system metrics (if deployed)
      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter:9100']
