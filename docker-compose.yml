# ============================================================
# PO Generator — Docker Compose (Local Development & Testing)
# ============================================================
# Usage:
#   docker-compose up --build          # start everything
#   docker-compose down -v             # stop & remove volumes
# ============================================================

version: "3.9"

services:
  # ── Database (MongoDB) ───────────────────────────────────
  mongodb:
    image: mongo:6
    container_name: po-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - po-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend (Node.js / Express) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: po-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: "5002"
    ports:
      - "5002:5002"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - po-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend (React / Vite → Nginx) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: po-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - po-network

# ── Named Volumes ─────────────────────────────────────────
volumes:
  uploads_data:
    driver: local
  mongo_data:
    driver: local

# ── Networks ──────────────────────────────────────────────
networks:
  po-network:
    driver: bridge
