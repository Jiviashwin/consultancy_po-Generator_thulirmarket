# ============================================================
# Local Jenkins Setup with Docker-in-Docker (DinD)
# ============================================================
# Usage:
#   cd jenkins/
#   docker-compose up -d --build
#   docker exec jenkins-server cat /var/jenkins_home/secrets/initialAdminPassword
#   Open: http://localhost:8080
# ============================================================

version: "3.9"

services:
  # ── Jenkins Controller ───────────────────────────────────
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: jenkins-custom:latest
    container_name: jenkins-server
    restart: unless-stopped
    privileged: true          # Required for Docker-in-Docker
    user: root
    ports:
      - "8080:8080"           # Jenkins Web UI
      - "50000:50000"         # Jenkins agent port
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount host Docker socket so Jenkins can build images
      # Mac Docker Desktop uses this path instead of /var/run/docker.sock
      - /Users/jiviashwin/.docker/run/docker.sock:/var/run/docker.sock
      # Mount host kubeconfig so kubectl inside Jenkins can reach Minikube
      - ~/.kube:/root/.kube:ro
      - ~/.minikube:/root/.minikube:ro
    environment:
      JENKINS_OPTS: "--httpPort=8080"
      # Make kubectl use the mounted kubeconfig by default
      KUBECONFIG: "/root/.kube/config"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - jenkins-network

# ── Named Volumes ─────────────────────────────────────────
volumes:
  jenkins_home:
    driver: local

# ── Networks ──────────────────────────────────────────────
networks:
  jenkins-network:
    driver: bridge
