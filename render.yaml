services:
  - type: web
    name: po-generator-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5002
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: STORE_NAME
        sync: false
      - key: STORE_ADDRESS
        sync: false
      - key: STORE_EMAIL
        sync: false
      - key: STORE_PHONE
        sync: false
      - key: FRONTEND_URL
        sync: false
